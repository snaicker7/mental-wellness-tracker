services:
  - type: web
    name: mental-wellness-tracker-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mental-wellness-tracker-db
          property: connectionString
      - key: JOURNAL_ENCRYPTION_KEY
        sync: false
      - key: ADDR
        value: :8080

databases:
  - name: mental-wellness-tracker-db
    databaseName: mental_wellness_tracker
    user: mental_wellness_tracker
    plan: free
